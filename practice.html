<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>练习 - 习思想刷题系统</title>
    <link rel="stylesheet" href="styles.css?v=20260612-5" />
  </head>
  <body data-page="practice">
    <div class="app-shell">
      <header class="topbar simple-topbar">
        <div class="brand-block">
          <p class="eyebrow">专注练习</p>
          <h1>章节刷题</h1>
        </div>
      </header>

      <main class="workspace practice-page">
        <details class="chapter-picker simple-picker">
          <summary>切换章节</summary>
          <div id="chapterList" class="chapter-list"></div>
        </details>

        <section class="practice-layout">
          <article class="question-panel">
            <div class="practice-header">
              <div>
                <p class="mode-label" id="modeLabel">章节练习</p>
                <h2 id="setTitle">导论练习题</h2>
              </div>
              <div class="progress-copy">
                <span id="questionIndex">1 / 10</span>
                <span id="sessionScore">本轮 0 分</span>
              </div>
            </div>

            <div class="progress-bar" aria-hidden="true">
              <span id="progressFill"></span>
            </div>

            <div class="question-meta">
              <span id="questionType">单选题</span>
              <span id="questionPoint">10 分</span>
            </div>

            <h3 id="questionText"></h3>
            <div id="optionsList" class="options-list"></div>
            <div id="feedback" class="feedback" hidden></div>

            <div class="question-actions">
              <button class="ghost-button" id="prevQuestion" type="button">上一题</button>
              <button class="text-button" id="favoriteQuestion" type="button">☆ 收藏</button>
              <button class="primary-button" id="submitAnswer" type="button">提交</button>
              <button class="ghost-button" id="nextQuestion" type="button">下一题</button>
            </div>
          </article>

          <aside class="answer-sheet compact-sheet" aria-label="答题卡">
            <div class="sheet-header">
              <div>
                <p class="mode-label">答题卡</p>
                <h2 id="sheetTitle">导论</h2>
              </div>
              <button class="text-button" id="restartSet" type="button">重做</button>
            </div>
            <div id="answerGrid" class="answer-grid"></div>
            <div class="chapter-status" id="chapterStatus"></div>
          </aside>
        </section>
      </main>

      <nav class="site-nav" aria-label="主要导航">
        <a href="index.html">首页</a>
        <a href="chapters.html">章节</a>
        <a href="practice.html" class="active">练习</a>
        <a href="review.html">复习</a>
      </nav>
    </div>

    <script src="app.js?v=20260612-5"></script>
  </body>
</html>

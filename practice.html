<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>章节练习 - 习思想刷题系统</title>
    <link rel="stylesheet" href="styles.css?v=20260612-3" />
  </head>
  <body data-page="practice">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">学习题库</p>
          <h1>习思想刷题系统</h1>
        </div>
        <nav class="site-nav" aria-label="主要导航">
          <a href="index.html">首页</a>
          <a href="chapters.html">章节</a>
          <a href="practice.html" class="active">练习</a>
          <a href="review.html">复习</a>
          <a href="stats.html">统计</a>
        </nav>
        <div class="top-actions">
          <button class="icon-button" id="resetProgress" title="清空记录" type="button">↻</button>
          <button class="primary-button" id="quickStart" type="button">继续练习</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar">
          <section class="nav-section">
            <h2>练习模式</h2>
            <button class="nav-item active" data-mode="chapter" type="button">章节练习</button>
            <button class="nav-item" data-mode="random" type="button">随机练习</button>
            <button class="nav-item" data-mode="mistakes" type="button">错题本</button>
            <button class="nav-item" data-mode="favorites" type="button">收藏题</button>
            <button class="nav-item" data-mode="exam" type="button">模拟考试</button>
          </section>

          <section class="nav-section">
            <h2>章节</h2>
            <div id="chapterList" class="chapter-list"></div>
          </section>
        </aside>

        <section class="content-area">
          <section class="summary-grid" aria-label="学习概览">
            <article class="metric-card">
              <span>总题数</span>
              <strong id="totalQuestions">0</strong>
            </article>
            <article class="metric-card">
              <span>已练习</span>
              <strong id="answeredQuestions">0</strong>
            </article>
            <article class="metric-card">
              <span>正确率</span>
              <strong id="accuracyRate">0%</strong>
            </article>
            <article class="metric-card">
              <span>错题</span>
              <strong id="mistakeCount">0</strong>
            </article>
          </section>

          <section class="practice-layout">
            <article class="question-panel">
              <div class="practice-header">
                <div>
                  <p class="mode-label" id="modeLabel">章节练习</p>
                  <h2 id="setTitle">导论练习题</h2>
                </div>
                <div class="progress-copy">
                  <span id="questionIndex">1 / 10</span>
                  <span id="sessionScore">本轮 0 分</span>
                </div>
              </div>

              <div class="progress-bar" aria-hidden="true">
                <span id="progressFill"></span>
              </div>

              <div class="question-meta">
                <span id="questionType">单选题</span>
                <span id="questionPoint">10 分</span>
              </div>

              <h3 id="questionText"></h3>
              <div id="optionsList" class="options-list"></div>
              <div id="feedback" class="feedback" hidden></div>

              <div class="question-actions">
                <button class="ghost-button" id="prevQuestion" type="button">上一题</button>
                <button class="text-button" id="favoriteQuestion" type="button">☆ 收藏</button>
                <button class="primary-button" id="submitAnswer" type="button">提交答案</button>
                <button class="ghost-button" id="nextQuestion" type="button">下一题</button>
              </div>
            </article>

            <aside class="answer-sheet" aria-label="答题卡">
              <div class="sheet-header">
                <div>
                  <p class="mode-label">答题卡</p>
                  <h2 id="sheetTitle">导论</h2>
                </div>
                <button class="text-button" id="restartSet" type="button">重做本组</button>
              </div>
              <div id="answerGrid" class="answer-grid"></div>
              <div class="chapter-status" id="chapterStatus"></div>
            </aside>
          </section>
        </section>
      </main>
    </div>

    <script src="app.js?v=20260612-3"></script>
  </body>
</html>

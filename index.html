<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>首页 - 习思想刷题系统</title>
    <link rel="stylesheet" href="styles.css?v=20260612-5" />
  </head>
  <body data-page="home">
    <div class="app-shell">
      <header class="topbar simple-topbar">
        <div class="brand-block">
          <p class="eyebrow">学习题库</p>
          <h1>习思想刷题系统</h1>
        </div>
      </header>

      <main class="page-shell simple-page">
        <section class="summary-grid" aria-label="学习概览">
          <article class="metric-card">
            <span>总题数</span>
            <strong id="totalQuestions">0</strong>
          </article>
          <article class="metric-card">
            <span>已练习</span>
            <strong id="answeredQuestions">0</strong>
          </article>
          <article class="metric-card">
            <span>正确率</span>
            <strong id="accuracyRate">0%</strong>
          </article>
          <article class="metric-card">
            <span>错题</span>
            <strong id="mistakeCount">0</strong>
          </article>
        </section>

        <section class="home-actions simple-actions" aria-label="常用操作">
          <a class="feature-card primary-feature" href="chapters.html">
            <span>按章节练习</span>
            <strong>从导论到第十六章逐章刷题</strong>
          </a>
          <a class="feature-card" href="practice.html">
            <span>继续练习</span>
            <strong>直接进入上次练习的题组</strong>
          </a>
          <a class="feature-card" href="review.html">
            <span>错题复习</span>
            <strong>集中处理答错题和收藏题</strong>
          </a>
        </section>
      </main>

      <nav class="site-nav" aria-label="主要导航">
        <a href="index.html" class="active">首页</a>
        <a href="chapters.html">章节</a>
        <a href="practice.html">练习</a>
        <a href="review.html">复习</a>
      </nav>
    </div>

    <script src="app.js?v=20260612-5"></script>
    <script src="pages.js?v=20260612-5"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>统计 - 习思想刷题系统</title>
    <link rel="stylesheet" href="styles.css?v=20260612-3" />
  </head>
  <body data-page="stats">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">学习分析</p>
          <h1>进度统计</h1>
        </div>
        <nav class="site-nav" aria-label="主要导航">
          <a href="index.html">首页</a>
          <a href="chapters.html">章节</a>
          <a href="practice.html">练习</a>
          <a href="review.html">复习</a>
          <a href="stats.html" class="active">统计</a>
        </nav>
        <div class="top-actions">
          <a class="primary-button" href="chapters.html">继续刷题</a>
        </div>
      </header>

      <main class="page-shell">
        <section class="summary-grid" aria-label="学习概览">
          <article class="metric-card">
            <span>总题数</span>
            <strong id="totalQuestions">0</strong>
          </article>
          <article class="metric-card">
            <span>已练习</span>
            <strong id="answeredQuestions">0</strong>
          </article>
          <article class="metric-card">
            <span>正确率</span>
            <strong id="accuracyRate">0%</strong>
          </article>
          <article class="metric-card">
            <span>错题</span>
            <strong id="mistakeCount">0</strong>
          </article>
        </section>

        <section class="page-section">
          <div class="section-heading">
            <p class="mode-label">按章节</p>
            <h2>练习进度</h2>
          </div>
          <div id="chapterStats" class="stats-list"></div>
        </section>
      </main>
    </div>

    <script src="app.js?v=20260612-3"></script>
    <script src="pages.js?v=20260612-3"></script>
  </body>
</html>
